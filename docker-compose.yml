services:

  user-service:
    build: ./user-service
    container_name: user-service
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_DB: ${POSTGRES_DB}
    secrets:
      - postgres_user
      - postgres_password
    networks:
      - todo-network
    depends_on:
      - postgres
    ports:
      - "${USER_SERVICE_PORT}:3000"
    restart: always
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  task-service:
    build: ./task-service
    container_name: task-service
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_DB: ${POSTGRES_DB}
    secrets:
      - postgres_user
      - postgres_password
    networks:
      - todo-network
    depends_on:
      - postgres
    ports:
      - "${TASK_SERVICE_PORT}:4000"
    restart: always
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:4000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  web-frontend:
    build: ./web-frontend
    container_name: web-frontend
    ports:
      - "${WEB_PORT}:80"
    depends_on:
      - user-service
      - task-service
    networks:
      - todo-network
    restart: always

  postgres:
    image: postgres:16-alpine
    container_name: postgres
    environment:
      POSTGRES_USER_FILE: /run/secrets/postgres_user
      POSTGRES_PASSWORD_FILE: /run/secrets/postgres_password
      POSTGRES_DB: ${POSTGRES_DB}
    secrets:
      - postgres_user
      - postgres_password
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    networks:
      - todo-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$(cat /run/secrets/postgres_user)"]
      interval: 30s
      timeout: 10s
      retries: 5

secrets:
  postgres_user:
    file: ./secrets/postgres_user
  postgres_password:
    file: ./secrets/postgres_password

networks:
  todo-network:
    driver: bridge

volumes:
  postgres-data:
