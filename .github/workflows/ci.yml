name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ghcr.io/${{ github.repository_owner }}

jobs:

  lint-test-node:
    name: Lint & Test – user-service
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: user-service
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install dependencies
        run: npm install

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm test

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: node-test-report
          path: user-service/junit.xml

  lint-test-python:
    name: Lint & Test – task-service
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: task-service
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: |
            task-service/requirements.txt
            task-service/requirements-dev.txt

      - name: Install dependencies
        run: pip install -r requirements.txt -r requirements-dev.txt

      - name: Lint
        run: ruff check .

      - name: Security scan (bandit)
        run: bandit -r app/ -f json -o bandit-report.json
        continue-on-error: true

      - name: Test
        run: pytest --junitxml=junit.xml --cov=app --cov-report=xml:coverage.xml

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: python-reports
          path: |
            task-service/junit.xml
            task-service/coverage.xml
            task-service/bandit-report.json

  lint-php:
    name: Lint – web-frontend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: PHP syntax check
        run: find web-frontend -name "*.php" -exec php -l {} \;

  security:
    name: Security Scan (Trivy FS)
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@v4

      - name: Trivy filesystem scan
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: fs
          scan-ref: .
          format: sarif
          output: trivy-fs.sarif
          severity: CRITICAL,HIGH
          exit-code: '0'

      - uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: trivy-fs.sarif
          category: trivy-fs

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: security-reports
          path: |
            trivy-fs.sarif
            vex.json

  build:
    name: Build & Push – ${{ matrix.service.name }}
    runs-on: ubuntu-latest
    needs: [lint-test-node, lint-test-python, lint-php]
    permissions:
      contents: read
      packages: write
      security-events: write
    strategy:
      matrix:
        service:
          - name: user-service
            context: ./user-service
          - name: task-service
            context: ./task-service
          - name: web-frontend
            context: ./web-frontend
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/metadata-action@v5
        id: meta
        with:
          images: ${{ env.IMAGE_PREFIX }}/${{ matrix.service.name }}
          tags: |
            type=sha,prefix=sha-,format=short
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}

      - name: Build image (local)
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.service.context }}
          load: true
          tags: ${{ env.IMAGE_PREFIX }}/${{ matrix.service.name }}:scan
          cache-from: type=gha,scope=${{ matrix.service.name }}
          cache-to: type=gha,scope=${{ matrix.service.name }},mode=max

      - name: Trivy image scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.IMAGE_PREFIX }}/${{ matrix.service.name }}:scan
          format: json
          output: trivy-${{ matrix.service.name }}.json
          severity: CRITICAL,HIGH,MEDIUM
          exit-code: '0'

      - uses: actions/upload-artifact@v4
        with:
          name: trivy-image-${{ matrix.service.name }}
          path: trivy-${{ matrix.service.name }}.json

      - name: Push image
        if: github.event_name != 'pull_request'
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.service.context }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=${{ matrix.service.name }}
